<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idempotency Key</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 40px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  .stage { width: 100%; max-width: 820px; }

  .key-badge {
    font-size: 0.58rem;
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.4s;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .key-badge.show { opacity: 1; }

  .store-kv {
    font-size: 0.57rem;
    background: rgba(170,0,255,0.07);
    border: 1px solid rgba(170,0,255,0.25);
    border-radius: 6px;
    padding: 4px 7px;
    width: 100%;
    text-align: left;
    opacity: 0;
    transition: opacity 0.4s;
    word-break: break-all;
    line-height: 1.6;
  }
  .store-kv.show { opacity: 1; }
  .store-kv .k { color: #ce93d8; }
  .store-kv .v { color: var(--accent3); }
  .store-kv .sep { color: var(--muted); }
</style>
</head>
<body>

<nav class="anim-nav">
  <a href="index.html">ghost_dev</a>
  <span class="nav-sep">/</span>
  <a href="idempotency-key.html">Idempotency Key</a>
  <span class="nav-sep">/</span>
  <span class="nav-current">анимация с ключом</span>
</nav>

<h1>Idempotency Key ✅</h1>
<div class="subtitle">пошаговая визуализация</div>

<div class="stage">
  <div class="actors">
    <div class="actor client" id="a-client">
      <div class="actor-icon">💻</div>
      <div class="actor-label">Клиент</div>
      <div class="key-badge" id="client-badge">🔑 <span id="badge-key"></span></div>
      <div class="actor-status" id="s-client">ожидание</div>
    </div>
    <div class="actor server" id="a-server">
      <div class="actor-icon">⚙️</div>
      <div class="actor-label">Сервер</div>
      <div class="actor-status" id="s-server">ожидание</div>
    </div>
    <div class="actor store" id="a-store">
      <div class="actor-icon">🗄️</div>
      <div class="actor-label">Хранилище</div>
      <div class="store-kv" id="store-kv">
        <span class="k" id="kv-k"></span><span class="sep"> → </span><span class="v" id="kv-v"></span>
      </div>
      <div class="actor-status" id="s-store">пусто</div>
    </div>
  </div>

  <div class="net-area" id="net-area"></div>

  <div class="phase-bar">
    <div class="phase-num" id="phase-num">—</div>
    <div class="phase-text" id="phase-text"><span class="dim">нажми «Следующий шаг»</span></div>
  </div>

  <div class="step-dots" id="dots"></div>

  <div class="log-box">
    <div class="log-head">// лог событий</div>
    <div id="log"></div>
  </div>

  <div class="ctrl">
    <div>
      <button class="btn" id="btn-next">▶ Следующий шаг</button>
      <div class="btn-hint" id="btn-hint">шаг 0 из 8</div>
    </div>
    <button class="btn" id="btn-reset">↺ Сбросить</button>
  </div>
</div>

<script>
const TOTAL = 8;
let IKEY = '', TXID = '';
let logClock = 0;
let animating = false;
let currentStep = -1;

const $ = id => document.getElementById(id);

// ── dots ─────────────────────────────────────────────────────────────────────

function buildDots() {
  const c = $('dots'); c.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot'; d.id = 'dot' + i;
    c.appendChild(d);
  }
}

function updateDots(active) {
  for (let i = 0; i < TOTAL; i++) {
    const d = $('dot' + i);
    d.className = 'dot' + (i < active ? ' done' : i === active ? ' active' : '');
  }
}

// ── log ──────────────────────────────────────────────────────────────────────

function log(msg, type = '') {
  const container = $('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  const ts = String(logClock).padStart(2, '0') + 's';
  line.innerHTML = `<span class="ts">[${ts}]</span><span class="msg">${msg}</span>`;
  container.appendChild(line);
  requestAnimationFrame(() => line.classList.add('in'));
  const box = document.querySelector('.log-box');
  setTimeout(() => { box.scrollTop = box.scrollHeight; }, 50);
  logClock++;
}

// ── actors ───────────────────────────────────────────────────────────────────

function hl(who) {
  $('a-client').classList.remove('hl-c','hl-s','hl-st');
  $('a-server').classList.remove('hl-c','hl-s','hl-st');
  $('a-store').classList.remove('hl-c','hl-s','hl-st');
  if (who === 'c')  $('a-client').classList.add('hl-c');
  if (who === 's')  $('a-server').classList.add('hl-s');
  if (who === 'st') $('a-store').classList.add('hl-st');
}
function noHl() {
  $('a-client').classList.remove('hl-c'); 
  $('a-server').classList.remove('hl-s');
  $('a-store').classList.remove('hl-st');
}

function status(who, msg, type = '') {
  const el = $('s-' + who);
  el.textContent = msg;
  el.className = 'actor-status ' + type;
}

function setPhase(num, html) {
  $('phase-num').textContent = num;
  $('phase-text').innerHTML  = html;
}

// ── packets ──────────────────────────────────────────────────────────────────

const POS = { client: 16.66, server: 50, store: 83.33 };

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function setPktPos(el, pct) {
  el.style.left = pct + '%';
}

function getOrCreatePkt(id, bubbleHtml, bubbleClass, arrowDir) {
  let el = $(id);
  if (el) { el.remove(); }
  el = document.createElement('div');
  el.className = 'pkt';
  el.id = id;
  const arrow = arrowDir === 'left' ? '◀' : '▶';
  el.innerHTML = `<div class="pkt-bubble ${bubbleClass}">${bubbleHtml}</div><div class="pkt-dir">${arrow}</div>`;
  el.style.top = '50%';
  el.style.transform = 'translate(-50%, -50%)';
  $('net-area').appendChild(el);
  return el;
}

async function animPkt(el, from, to, ms, keepVisible) {
  el.classList.add('vis');
  setPktPos(el, from);
  const start = performance.now();
  await new Promise(resolve => {
    function frame(ts) {
      const t = Math.min((ts - start) / ms, 1);
      setPktPos(el, from + (to - from) * easeInOut(t));
      if (t < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
  if (!keepVisible) el.classList.remove('vis');
}

async function animPktHalf(el, from, to, fraction, ms) {
  const dest = from + (to - from) * fraction;
  el.classList.add('vis');
  setPktPos(el, from);
  const start = performance.now();
  await new Promise(resolve => {
    function frame(ts) {
      const t = Math.min((ts - start) / ms, 1);
      setPktPos(el, from + (dest - from) * easeInOut(t));
      if (t < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
  el.classList.remove('vis');
}

// ── steps ────────────────────────────────────────────────────────────────────

const steps = [

  // 0 — генерация ключа
  async () => {
    IKEY = ['A','B','C','D','E','F'].map(()=>Math.random().toString(36).slice(2,4).toUpperCase()).join('').slice(0,5)
         + '-'
         + ['A','B','C','D','E','F'].map(()=>Math.random().toString(36).slice(2,4).toUpperCase()).join('').slice(0,5);
    TXID = 'TX-' + Math.random().toString(36).slice(2,7).toUpperCase();

    hl('c');
    $('badge-key').textContent = IKEY;
    $('client-badge').classList.add('show');
    status('client', `ключ готов`, 'info');
    setPhase('1 / 8', `Клиент генерирует <b>Idempotency-Key</b> для запроса`);
    log(`Клиент: сгенерирован Idempotency-Key = ${IKEY}`, 'info');
  },

  // 1 — запрос летит к серверу
  async () => {
    hl('c');
    status('client', 'отправка запроса...', 'warn');
    setPhase('2 / 8', `Клиент отправляет запрос с ключом идемпотентности`);
    log(`Клиент → Сервер: POST /pay  Idempotency-Key: ${IKEY}`, 'info');

    const p = getOrCreatePkt('p-req',
      `POST /pay<br><span style="color:var(--accent)">Idempotency-Key: ${IKEY}</span>`,
      '', 'right');
    await animPkt(p, POS.client, POS.server, 1400);
    hl('s');
    status('server', 'запрос получен', 'info');
  },

  // 2 — сервер проверяет хранилище → miss
  async () => {
    hl('s');
    status('server', 'проверяю хранилище...', 'warn');
    setPhase('3 / 8', `Сервер ищет ключ в хранилище — <span style="color:var(--accent2)">не найден (miss)</span>`);
    log(`Сервер: ищу ключ "${IKEY}" в хранилище...`, 'warn');

    const pFwd = getOrCreatePkt('p-chk', `GET ${IKEY}`, '', 'right');
    await animPkt(pFwd, POS.server, POS.store, 1100);

    hl('st');
    status('store', 'miss — ключ не найден', 'warn');
    log(`Хранилище: ключ не найден → miss`, 'warn');
    await sleep(500);

    const pBck = getOrCreatePkt('p-miss', `null`, 'error', 'left');
    await animPkt(pBck, POS.store, POS.server, 1000);

    hl('s');
    status('server', 'ключ новый → выполняю операцию', 'warn');
    log(`Сервер: ключ новый → выполняю платёж...`, '');
  },

  // 3 — выполняет операцию, сохраняет
  async () => {
    hl('s');
    status('server', 'выполняю платёж...', 'warn');
    setPhase('4 / 8', `Сервер выполняет операцию и сохраняет результат`);
    await sleep(1200);
    log(`Сервер: платёж выполнен → ${TXID}`, 'ok');
    status('server', `результат готов: ${TXID}`, 'ok');

    log(`Сервер → Хранилище: SET ${IKEY} → ${TXID}`, 'info');
    const p = getOrCreatePkt('p-save', `SET ${IKEY}<br>→ ${TXID}`, '', 'right');
    await animPkt(p, POS.server, POS.store, 1100);

    hl('st');
    $('kv-k').textContent = IKEY;
    $('kv-v').textContent = TXID;
    $('store-kv').classList.add('show');
    status('store', 'запись сохранена ✓', 'ok');
    log(`Хранилище: сохранено ✓`, 'ok');
  },

  // 4 — ответ теряется из-за сбоя
  async () => {
    hl('s');
    status('server', 'отправляю ответ клиенту...', 'info');
    setPhase('5 / 8', `Ответ отправлен, но <span style="color:var(--accent2)">⚡ сетевой сбой</span> — клиент не получает ответ`);
    log(`Сервер → Клиент: 200 OK  tx_id=${TXID}`, 'info');

    const p = getOrCreatePkt('p-resp', `200 OK<br>tx_id: ${TXID}`, 'resp', 'left');
    await animPktHalf(p, POS.server, POS.client, 0.4, 900);

    const lost = getOrCreatePkt('p-lost', `⚡ сетевой сбой`, 'error', 'right');
    const midX = POS.server + (POS.client - POS.server) * 0.4;
    lost.style.left = midX + '%';
    lost.classList.add('vis');
    log(`⚡ СЕТЕВОЙ СБОЙ: ответ потерян в сети`, 'err');
    hl('c');
    status('client', 'нет ответа... таймаут', 'err');
    await sleep(1600);
    lost.classList.remove('vis');
  },

  // 5 — клиент ретраит
  async () => {
    hl('c');
    status('client', 'ретрай с тем же ключом', 'warn');
    setPhase('6 / 8', `Клиент делает ретрай <b>с тем же Idempotency-Key</b>`);
    log(`Клиент: таймаут → ретрай. Тот же Idempotency-Key: ${IKEY}`, 'warn');

    const p = getOrCreatePkt('p-retry',
      `POST /pay (retry)<br><span style="color:var(--accent)">Idempotency-Key: ${IKEY}</span>`,
      '', 'right');
    await animPkt(p, POS.client, POS.server, 1400);
    hl('s');
    status('server', 'повторный запрос получен', 'info');
  },

  // 6 — сервер находит ключ → hit
  async () => {
    hl('s');
    status('server', 'проверяю хранилище...', 'warn');
    setPhase('7 / 8', `Сервер снова проверяет хранилище — <span style="color:var(--accent3)">ключ найден! (hit)</span>`);
    log(`Сервер: ищу ключ "${IKEY}" в хранилище...`, 'warn');

    const pFwd = getOrCreatePkt('p-chk2', `GET ${IKEY}`, '', 'right');
    await animPkt(pFwd, POS.server, POS.store, 1100);

    hl('st');
    log(`Хранилище: ключ найден → HIT!  tx_id = ${TXID}`, 'ok');
    status('store', `HIT → ${TXID}`, 'ok');

    const st = $('a-store');
    for (let i = 0; i < 3; i++) {
      st.style.boxShadow = '0 0 28px rgba(170,0,255,0.9)';
      await sleep(220);
      st.style.boxShadow = '';
      await sleep(220);
    }

    const pBck = getOrCreatePkt('p-hit', `${TXID}`, 'resp', 'left');
    await animPkt(pBck, POS.store, POS.server, 1000);

    hl('s');
    log(`Сервер: операция НЕ выполняется повторно → возвращаю кэш`, 'ok');
    status('server', 'возвращаю кэшированный ответ', 'ok');
  },

  // 7 — ответ доходит
  async () => {
    hl('s');
    setPhase('8 / 8', `Ответ доходит до клиента — <span style="color:var(--accent3)">идемпотентность соблюдена ✅</span>`);
    log(`Сервер → Клиент: 200 OK (cached)  tx_id=${TXID}`, 'ok');

    const p = getOrCreatePkt('p-resp2', `200 OK (cached)<br>tx_id: ${TXID}`, 'resp', 'left');
    await animPkt(p, POS.server, POS.client, 1400);

    hl('c');
    status('client', `✅ tx_id: ${TXID}`, 'ok');
    log(`Клиент: ответ получен!  tx_id = ${TXID}`, 'ok');
    log(`Клиент: платёж НЕ задублирован ✅`, 'ok');

    noHl();
    $('btn-next').disabled = true;
    $('btn-hint').textContent = 'анимация завершена';
  }
];

// ── runner ───────────────────────────────────────────────────────────────────

async function nextStep() {
  if (animating || currentStep >= TOTAL - 1) return;
  animating = true;
  $('btn-next').disabled = true;
  currentStep++;

  updateDots(currentStep);
  $('btn-hint').textContent = `шаг ${currentStep + 1} из ${TOTAL}`;

  await steps[currentStep]();

  animating = false;
  if (currentStep < TOTAL - 1) {
    $('btn-next').disabled = false;
  }
}

function reset() {
  if (animating) return;
  currentStep = -1;
  logClock = 0;
  IKEY = ''; TXID = '';

  $('log').innerHTML = '';
  noHl();
  setPhase('—', '<span class="dim">нажми «Следующий шаг»</span>');
  status('client', 'ожидание', '');
  status('server', 'ожидание', '');
  status('store',  'пусто', '');

  $('client-badge').classList.remove('show');
  $('badge-key').textContent = '';
  $('store-kv').classList.remove('show');
  $('kv-k').textContent = '';
  $('kv-v').textContent = '';

  $('a-store').style.boxShadow = '';
  $('net-area').querySelectorAll('.pkt').forEach(p => p.remove());

  buildDots();
  $('btn-next').disabled = false;
  $('btn-hint').textContent = `шаг 0 из ${TOTAL}`;
}

buildDots();
$('btn-next').addEventListener('click', nextStep);
$('btn-reset').addEventListener('click', reset);
</script>
</body>
</html>
